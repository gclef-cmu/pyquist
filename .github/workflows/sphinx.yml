name: Docs

# Build the Sphinx API docs on every push / PR; deploy to GitHub Pages on
# pushes to main.
#
# Prerequisite: in the repo's Settings → Pages, set "Source" to
# "GitHub Actions". The deploy job below uses the `github-pages` environment
# that GitHub creates automatically the first time it runs.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; cancel in-progress runs in favour of the
# latest one (so we never deploy a stale build).
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Install pyquist itself plus the docs extras (sphinx + typehints
      # plugin). Without an install, autodoc can't import pyquist and ends
      # up generating empty module pages.
      - name: Install pyquist + docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build HTML
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    # Only deploy on pushes to main; PR builds verify the build but don't ship.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
